name: Learn GitAction

on:
    push:
        branches:
            - main

jobs:
    job-1:
        runs-on: ubuntu-latest
        steps:
            - name: First Text Echo
              run: echo "Hello world first time"

    job-2:
        runs-on: ubuntu-latest
        steps:
            - name: ACTION WORK JOBS 2
              run: echo "Hello it's job 2"
    
    job-3:
        runs-on: ubuntu-latest
        steps:
            - name: ACTION WORK JOBS 3
              run: echo "Hello it's job 3"
    
    job-4:
        runs-on: ubuntu-latest
        needs: [job-1, job-2]  
        steps:
            - name: ACTION WORK JOBS 4
              run: echo "Hello it's job 4"
    
    job-5: 
        runs-on: ubuntu-latest
        needs: [job-2, job-3]
        steps:
            - name: ACTION WORK JOBS 5
              run: echo "Hello it's job 5"

    job-6: 
        runs-on: ubuntu-latest
        needs: [job-1, job-3, job-4]
        steps:
            - name: ACTION WORK JOBS 6
              run: echo "Hello it's job 6"

    job-7: 
        runs-on: ubuntu-latest
        needs: [job-2, job-4, job-5]
        steps:
            - name: ACTION WORK JOBS 7
              run: echo "Hello it's job 7"
              
    job-8:  # Fixed indentation
        runs-on: ubuntu-latest
        needs: [job-4, job-5]
        steps:
            - name: ACTION WORK JOBS 8  
              run: echo "Hello it's job 8"
              
    job-9: 
        runs-on: ubuntu-latest
        needs: [job-6, job-7, job-8]
        steps:
            - name: ACTION WORK JOBS 9  
              run: echo "Hello it's job 9"